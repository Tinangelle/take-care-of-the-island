<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Take Care of the Island — turn-based strategy simulation with procedural maps and metabolic crises."
    />
    <title>Take Care of the Island | Ignis Solaris Studio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="a11y.skip">Skip to content</a>

    <header class="site-header" id="top">
      <div class="header-inner">
        <a class="brand" href="index.html#top">Take Care of the Island</a>
        <nav class="nav-main" aria-label="Primary">
          <a href="#features" data-i18n="nav.features">Features</a>
          <a href="#gallery" data-i18n="nav.gallery">Gallery</a>
          <a href="devlog.html" data-i18n="nav.devlog">Dev Log</a>
          <a
            href="https://ignissolarisstudio.com/?lang=en#welcome"
            target="_blank"
            rel="noopener noreferrer"
            data-studio-link
            data-i18n="nav.studio"
            >Studio</a
          >
        </nav>
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" data-lang="en" aria-current="true">EN</button>
          <span aria-hidden="true">/</span>
          <button type="button" data-lang="zh">中文</button>
          <span aria-hidden="true">/</span>
          <button type="button" data-lang="fr">FR</button>
        </div>
      </div>
    </header>

    <main id="main">
      <section class="hero" id="home" aria-labelledby="hero-title">
        <div class="hero-media" aria-hidden="true"></div>
        <div class="hero-inner">
          <p class="hero-eyebrow" data-i18n="hero.eyebrow">Turn-based strategy · simulation</p>
          <h1 id="hero-title">Take Care of the Island</h1>
          <p class="hero-tagline" data-i18n="hero.tagline"></p>
          <div class="hero-actions">
            <a class="hero-cta" href="#gallery" data-i18n="hero.cta.gallery">View gallery</a>
            <a class="hero-cta hero-cta--ghost" href="#devlog" data-i18n="hero.cta.devlog">Dev log</a>
          </div>
          <p class="hero-scroll-hint" data-i18n="hero.scroll">Scroll to explore</p>
        </div>
      </section>

      <section class="section section--muted" id="features" aria-labelledby="features-title">
        <div class="section__inner">
          <header class="section__head">
            <h2 class="section__title" id="features-title" data-i18n="features.title">Game features</h2>
          </header>
          <div class="feature-grid">
            <article class="feature-card">
              <h3 data-i18n="features.f1.title"></h3>
              <p data-i18n="features.f1.body"></p>
            </article>
            <article class="feature-card">
              <h3 data-i18n="features.f2.title"></h3>
              <p data-i18n="features.f2.body"></p>
            </article>
            <article class="feature-card">
              <h3 data-i18n="features.f3.title"></h3>
              <p data-i18n="features.f3.body"></p>
            </article>
            <article class="feature-card">
              <h3 data-i18n="features.f4.title"></h3>
              <p data-i18n="features.f4.body"></p>
            </article>
            <article class="feature-card">
              <h3 data-i18n="features.f5.title"></h3>
              <p data-i18n="features.f5.body"></p>
            </article>
            <article class="feature-card">
              <h3 data-i18n="features.f6.title"></h3>
              <p data-i18n="features.f6.body"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="section" id="gallery" aria-labelledby="gallery-title">
        <div class="section__inner">
          <header class="section__head">
            <h2 class="section__title" id="gallery-title" data-i18n="gallery.title">Gallery</h2>
          </header>
          <div class="gallery-grid" role="list">
            <div class="gallery-item" role="listitem"><span data-i18n="gallery.placeholder"></span></div>
            <div class="gallery-item" role="listitem"><span data-i18n="gallery.placeholder"></span></div>
            <div class="gallery-item" role="listitem"><span data-i18n="gallery.placeholder"></span></div>
            <div class="gallery-item" role="listitem"><span data-i18n="gallery.placeholder"></span></div>
            <div class="gallery-item" role="listitem"><span data-i18n="gallery.placeholder"></span></div>
            <div class="gallery-item" role="listitem"><span data-i18n="gallery.placeholder"></span></div>
          </div>
        </div>
      </section>

      <section class="section section--muted" id="devlog" aria-labelledby="devlog-title">
        <div class="section__inner">
          <header class="section__head">
            <h2 class="section__title" id="devlog-title" data-i18n="devlog.title">Development log</h2>
            <p class="section__lead" data-i18n="devlog.lead"></p>
          </header>
          <div class="devlog-cards" id="devlog-cards"></div>
          <p class="devlog-open-full">
            <a class="devlog-open-full__link" href="devlog.html" data-i18n="devlog.openFull"></a>
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-bar">
        <p class="footer-copy">
          © <span id="y"></span> <span data-i18n="footer.copyLine"></span>
        </p>
        <nav class="footer-links" aria-label="Footer">
          <a
            href="https://ignissolarisstudio.com/?lang=en#welcome"
            target="_blank"
            rel="noopener noreferrer"
            data-studio-link
            data-i18n="footer.visitStudio"
            >Visit studio</a
          >
          <a href="#top" data-i18n="footer.top">Back to top</a>
        </nav>
      </div>
    </footer>

    <dialog class="devlog-dialog" id="devlog-dialog">
      <div class="devlog-dialog__panel" role="document">
        <button type="button" class="devlog-dialog__close" data-i18n="devlog.close">Close</button>
        <div class="devlog-dialog__body" id="devlog-dialog-body"></div>
      </div>
    </dialog>

    <script src="main.js" defer></script>
  </body>
</html>
